user root;
worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 64m;   # allow large CSV/JSON history uploads

    upstream backend { server 127.0.0.1:7200; }
    upstream mcp     { server 127.0.0.1:7211; }

    server {
        listen 7210;
        server_name _;
        root /app/web;
        index index.html;

        # API → gunicorn
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # MCP reverse-proxy convenience for the PWA origin
        location /mcp {
            proxy_pass http://mcp;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
        }

        # Service worker must not be cached aggressively
        location = /sw.js {
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
